# Database Properties (RDS PostgreSQL)
spring.datasource.url=jdbc:postgresql://${RDS_HOST:localhost}:5432/smartcity_db
spring.datasource.username=${RDS_USERNAME:postgres}
spring.datasource.password=${RDS_PASSWORD:postgres}

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Server / Spring App config
server.port=8080
spring.application.name=smart-city-backend

# JWT Configuration
jwt.secret=${JWT_SECRET:8a9b23b497e7f9a12c8b746c593d6238b12f67de48bc95c7423e80f12d4a5b6c}
jwt.expiration=86400000

# AWS & DynamoDB config
aws.region=us-east-1
aws.dynamodb.endpoint=${DYNAMODB_ENDPOINT:http://localhost:8000}

# Swagger UI path
springdoc.swagger-ui.path=/swagger-ui.html

# AI Python Service URL
ai.service.url=${AI_SERVICE_URL:http://localhost:8001}
